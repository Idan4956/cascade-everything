name: Feature request
description: Suggest an idea or improvement for Cascade
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make Cascade better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point you're trying to address.
      placeholder: "I often need to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Feel free to include mockups, links, or examples from other apps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there other apps that do this well?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it often
        - Blocking my workflow
    validations:
      required: true
