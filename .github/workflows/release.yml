name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. V2.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:

  # ── Explorer ────────────────────────────────────────────────────────────────

  explorer-windows:
    runs-on: windows-latest
    name: Explorer · Windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Ensure app-builder binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $v    = (node -p "require('./node_modules/app-builder-bin/package.json').version").Trim()
          $dest = "node_modules\app-builder-bin\win\x64"
          $bin  = "$dest\app-builder.exe"
          Write-Host "app-builder-bin version: $v"
          Write-Host "Binary path: $bin"
          if (Test-Path $bin) { Write-Host "Binary already present"; exit 0 }
          New-Item -ItemType Directory -Force $dest | Out-Null
          Write-Host "Downloading tarball..."
          curl.exe -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-$v.tgz" -o "$env:TEMP\ab.tgz"
          Write-Host "Extracting..."
          tar -xzOf "$env:TEMP\ab.tgz" "package/win/x64/app-builder.exe" > $bin
          if (!(Test-Path $bin)) { Write-Host "ERROR: binary still missing"; exit 1 }
          Write-Host "Done: $(Get-Item $bin)"
      - run: npm run build
        working-directory: apps/explorer
      - name: Build NSIS installer
        run: npx electron-builder --win nsis --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename artifacts
        shell: pwsh
        working-directory: apps/explorer
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch 'unins' } | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Cascade-Explorer-Setup.exe" } else { exit 1 }
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-Setup.exe
            apps/explorer/release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  explorer-macos:
    runs-on: macos-latest
    name: Explorer · macOS
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Ensure app-builder binary
        run: |
          set -e
          VER=$(node -p "require('./node_modules/app-builder-bin/package.json').version")
          ARCH=$(node -p "process.arch === 'x64' ? 'amd64' : process.arch")
          DEST="node_modules/app-builder-bin/mac"
          BIN="$DEST/app-builder_${ARCH}"
          echo "app-builder-bin version: $VER  arch: $ARCH"
          echo "Binary path: $BIN"
          if [ -f "$BIN" ]; then echo "Binary already present"; exit 0; fi
          mkdir -p "$DEST"
          echo "Downloading tarball..."
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-${VER}.tgz" -o /tmp/ab.tgz
          echo "Extracting..."
          tar -xzOf /tmp/ab.tgz "package/mac/app-builder_${ARCH}" > "$BIN"
          chmod +x "$BIN"
          echo "Done: $(ls -lh "$BIN")"
      - run: npm run build
        working-directory: apps/explorer
      - run: npx electron-builder --mac dmg --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename
        working-directory: apps/explorer
        run: |
          DMG=$(find release -name "*.dmg" | head -1)
          [ -n "$DMG" ] && mv "$DMG" release/Cascade-Explorer-mac.dmg || exit 1
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-mac.dmg
            apps/explorer/release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  explorer-linux:
    runs-on: ubuntu-latest
    name: Explorer · Linux
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Ensure app-builder binary
        run: |
          set -e
          VER=$(node -p "require('./node_modules/app-builder-bin/package.json').version")
          DEST="node_modules/app-builder-bin/linux/x64"
          BIN="$DEST/app-builder"
          echo "app-builder-bin version: $VER"
          echo "Binary path: $BIN"
          if [ -f "$BIN" ]; then echo "Binary already present"; exit 0; fi
          mkdir -p "$DEST"
          echo "Downloading tarball..."
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-${VER}.tgz" -o /tmp/ab.tgz
          echo "Extracting..."
          tar -xzOf /tmp/ab.tgz "package/linux/x64/app-builder" > "$BIN"
          chmod +x "$BIN"
          echo "Done: $(ls -lh "$BIN")"
      - run: sudo apt-get install -y rpm fakeroot
      - run: npm run build
        working-directory: apps/explorer
      - run: npx electron-builder --linux AppImage --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename
        working-directory: apps/explorer
        run: |
          IMG=$(find release -name "*.AppImage" | head -1)
          [ -n "$IMG" ] && mv "$IMG" release/Cascade-Explorer-linux.AppImage || exit 1
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-linux.AppImage
            apps/explorer/release/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Photos ──────────────────────────────────────────────────────────────────

  photos-windows:
