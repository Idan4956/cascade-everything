name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g. V2.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:

  # ── Windows (all apps) ───────────────────────────────────────────────────────

  windows:
    runs-on: windows-latest
    name: Windows · All Apps
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install app-builder binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $v   = (node -p "require('./node_modules/app-builder-bin/package.json').version").Trim()
          $tmp = "$env:TEMP\app-builder.exe"
          curl.exe -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-$v.tgz" -o "$env:TEMP\ab.tgz"
          tar -xzOf "$env:TEMP\ab.tgz" "package/win/x64/app-builder.exe" > $tmp
          if (!(Test-Path $tmp) -or (Get-Item $tmp).Length -eq 0) { Write-Host "ERROR: binary missing or empty"; exit 1 }
          $dest = "node_modules\app-builder-bin\win\x64"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item $tmp "$dest\app-builder.exe" -Force
          $pkg = Get-Content "node_modules\app-builder-bin\package.json" -Raw | ConvertFrom-Json
          $pkg.PSObject.Properties.Remove("scripts")
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "node_modules\app-builder-bin\package.json"
          echo "APP_BUILDER_BIN=$tmp" >> $env:GITHUB_ENV

      - run: npm run build
        working-directory: apps/explorer
      - run: npx electron-builder --win nsis --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Explorer
        shell: pwsh
        working-directory: apps/explorer
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch 'unins' } | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Cascade-Explorer-Setup.exe" } else { exit 1 }

      - run: npm run build
        working-directory: apps/photos
      - run: npx electron-builder --win nsis --publish=never
        working-directory: apps/photos
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Photos
        shell: pwsh
        working-directory: apps/photos
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch 'unins' } | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Cascade-Photos-Setup.exe" } else { exit 1 }

      - run: npm run build
        working-directory: apps/docs
      - run: npx electron-builder --win nsis --publish=never
        working-directory: apps/docs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Docs
        shell: pwsh
        working-directory: apps/docs
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch 'unins' } | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Cascade-Docs-Setup.exe" } else { exit 1 }

      - run: npm run build
        working-directory: apps/notes
      - run: npx electron-builder --win nsis --publish=never
        working-directory: apps/notes
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Notes
        shell: pwsh
        working-directory: apps/notes
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch 'unins' } | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Cascade-Notes-Setup.exe" } else { exit 1 }

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-Setup.exe
            apps/photos/release/Cascade-Photos-Setup.exe
            apps/docs/release/Cascade-Docs-Setup.exe
            apps/notes/release/Cascade-Notes-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS (all apps) ─────────────────────────────────────────────────────────

  macos:
    runs-on: macos-latest
    name: macOS · All Apps
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install app-builder binary
        run: |
          set -e
          VER=$(node -p "require('./node_modules/app-builder-bin/package.json').version")
          ARCH=$(node -p "process.arch === 'x64' ? 'amd64' : process.arch")
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-${VER}.tgz" -o /tmp/ab.tgz
          tar -xzOf /tmp/ab.tgz "package/mac/app-builder_${ARCH}" > /tmp/app-builder
          chmod +x /tmp/app-builder
          /tmp/app-builder --version
          DEST="node_modules/app-builder-bin/mac"
          mkdir -p "$DEST"
          cp /tmp/app-builder "$DEST/app-builder_${ARCH}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./node_modules/app-builder-bin/package.json', 'utf8'));
            delete pkg.scripts;
            fs.writeFileSync('./node_modules/app-builder-bin/package.json', JSON.stringify(pkg, null, 2));
          "
          echo "APP_BUILDER_BIN=/tmp/app-builder" >> $GITHUB_ENV

      - run: npm run build
        working-directory: apps/explorer
      - run: npx electron-builder --mac dmg --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Explorer
        working-directory: apps/explorer
        run: mv "$(find release -name '*.dmg' | head -1)" release/Cascade-Explorer-mac.dmg

      - run: npm run build
        working-directory: apps/photos
      - run: npx electron-builder --mac dmg --publish=never
        working-directory: apps/photos
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Photos
        working-directory: apps/photos
        run: mv "$(find release -name '*.dmg' | head -1)" release/Cascade-Photos-mac.dmg

      - run: npm run build
        working-directory: apps/docs
      - run: npx electron-builder --mac dmg --publish=never
        working-directory: apps/docs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Docs
        working-directory: apps/docs
        run: mv "$(find release -name '*.dmg' | head -1)" release/Cascade-Docs-mac.dmg

      - run: npm run build
        working-directory: apps/notes
      - run: npx electron-builder --mac dmg --publish=never
        working-directory: apps/notes
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Notes
        working-directory: apps/notes
        run: mv "$(find release -name '*.dmg' | head -1)" release/Cascade-Notes-mac.dmg

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-mac.dmg
            apps/photos/release/Cascade-Photos-mac.dmg
            apps/docs/release/Cascade-Docs-mac.dmg
            apps/notes/release/Cascade-Notes-mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux (all apps) ─────────────────────────────────────────────────────────

  linux:
    runs-on: ubuntu-latest
    name: Linux · All Apps
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install app-builder binary
        run: |
          set -e
          VER=$(node -p "require('./node_modules/app-builder-bin/package.json').version")
          curl -fsSL "https://registry.npmjs.org/app-builder-bin/-/app-builder-bin-${VER}.tgz" -o /tmp/ab.tgz
          tar -xzOf /tmp/ab.tgz "package/linux/x64/app-builder" > /tmp/app-builder
          chmod +x /tmp/app-builder
          DEST="node_modules/app-builder-bin/linux/x64"
          mkdir -p "$DEST"
          cp /tmp/app-builder "$DEST/app-builder"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./node_modules/app-builder-bin/package.json', 'utf8'));
            delete pkg.scripts;
            fs.writeFileSync('./node_modules/app-builder-bin/package.json', JSON.stringify(pkg, null, 2));
          "
          echo "APP_BUILDER_BIN=/tmp/app-builder" >> $GITHUB_ENV
      - run: sudo apt-get install -y rpm fakeroot

      - run: npm run build
        working-directory: apps/explorer
      - run: npx electron-builder --linux AppImage --publish=never
        working-directory: apps/explorer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Explorer
        working-directory: apps/explorer
        run: mv "$(find release -name '*.AppImage' | head -1)" release/Cascade-Explorer-linux.AppImage

      - run: npm run build
        working-directory: apps/photos
      - run: npx electron-builder --linux AppImage --publish=never
        working-directory: apps/photos
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Photos
        working-directory: apps/photos
        run: mv "$(find release -name '*.AppImage' | head -1)" release/Cascade-Photos-linux.AppImage

      - run: npm run build
        working-directory: apps/docs
      - run: npx electron-builder --linux AppImage --publish=never
        working-directory: apps/docs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Docs
        working-directory: apps/docs
        run: mv "$(find release -name '*.AppImage' | head -1)" release/Cascade-Docs-linux.AppImage

      - run: npm run build
        working-directory: apps/notes
      - run: npx electron-builder --linux AppImage --publish=never
        working-directory: apps/notes
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Notes
        working-directory: apps/notes
        run: mv "$(find release -name '*.AppImage' | head -1)" release/Cascade-Notes-linux.AppImage

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            apps/explorer/release/Cascade-Explorer-linux.AppImage
            apps/photos/release/Cascade-Photos-linux.AppImage
            apps/docs/release/Cascade-Docs-linux.AppImage
            apps/notes/release/Cascade-Notes-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
